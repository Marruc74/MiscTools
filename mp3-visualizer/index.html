<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MP3 → Visualizer Video</title>
<style>
  :root {
    --bg: #07070d;
    --panel: #11121c;
    --panel-2: #181a28;
    --line: #262838;
    --text: #e9eaf6;
    --muted: #8b8da8;
    --accent: #6c7bff;
    --accent-2: #ff5b9e;
    --good: #41d6a0;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(108,123,255,0.18), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(255,91,158,0.14), transparent 55%),
      var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }
  header {
    padding: 22px 28px 14px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 19px; margin: 0; letter-spacing: -0.01em; font-weight: 650; }
  header .sub { color: var(--muted); font-size: 13px; }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    padding: 0 28px 28px;
    min-height: 0;
  }
  @media (max-width: 880px) { main { grid-template-columns: 1fr; } }

  .panel {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
  }
  .controls { display: flex; flex-direction: column; gap: 18px; align-self: start; }

  .drop {
    border: 1.5px dashed var(--line);
    border-radius: var(--radius);
    padding: 26px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    background: rgba(255,255,255,0.015);
  }
  .drop:hover, .drop.over { border-color: var(--accent); background: rgba(108,123,255,0.08); }
  .drop strong { display: block; margin-bottom: 4px; }
  .drop span { color: var(--muted); font-size: 12.5px; }
  .drop .name { color: var(--good); margin-top: 8px; font-size: 13px; word-break: break-all; }
  input[type=file] { display: none; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field > label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  select, button {
    font: inherit; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 9px; padding: 9px 11px; cursor: pointer;
  }
  select:focus, button:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { width: 30px; height: 30px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
  .swatch.active { border-color: #fff; }

  .toggle { display: flex; align-items: center; gap: 9px; cursor: pointer; user-select: none; font-size: 13px; color: var(--muted); }
  .toggle input { accent-color: var(--accent); width: 16px; height: 16px; }

  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  button.primary {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border: none; font-weight: 600; color: #fff;
  }
  button.primary:disabled { opacity: .45; cursor: not-allowed; }
  button.ghost:disabled { opacity: .4; cursor: not-allowed; }

  .stage { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .canvas-wrap {
    position: relative; flex: 1; min-height: 360px;
    border-radius: var(--radius); overflow: hidden;
    border: 1px solid var(--line);
    background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  canvas { width: 100%; height: 100%; display: block; }

  .badge {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.55); border: 1px solid var(--line);
    padding: 5px 10px; border-radius: 999px; font-size: 12px;
    display: none; align-items: center; gap: 7px; backdrop-filter: blur(6px);
  }
  .badge.show { display: inline-flex; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #ff4d4d; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .25; } }

  .transport { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .time { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 13px; min-width: 92px; }
  .hint { color: var(--muted); font-size: 12.5px; }
  a.dl { color: var(--good); font-weight: 600; text-decoration: none; }
  a.dl:hover { text-decoration: underline; }
  .resbar { height: 4px; border-radius: 999px; background: var(--line); overflow: hidden; }
  .resbar > i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .1s; }
</style>
</head>
<body>
<header>
  <h1>MP3 → Visualizer Video</h1>
  <span class="sub">Drop an MP3, pick a style, record a video — all in your browser.</span>
</header>

<main>
  <section class="panel controls">
    <div class="drop" id="drop" tabindex="0" role="button" aria-label="Choose an audio file">
      <strong>Drop audio here</strong>
      <span>or click to browse · MP3, WAV, OGG, M4A</span>
      <div class="name" id="fileName"></div>
    </div>
    <input type="file" id="file" accept="audio/*" />

    <div class="field">
      <label for="style">Visualizer style</label>
      <select id="style">
        <option value="bars">Neon bars</option>
        <option value="mirror">Mirror bars</option>
        <option value="spectrum">Spectrum mountains</option>
        <option value="circle">Radial spectrum</option>
        <option value="blob">Liquid blob</option>
        <option value="wave">Aurora ribbons</option>
        <option value="galaxy">Galaxy burst</option>
        <option value="rings">Bloom rings</option>
      </select>
    </div>

    <div class="field">
      <label>Color theme</label>
      <div class="swatches" id="swatches"></div>
    </div>

    <div class="field">
      <label for="res">Resolution</label>
      <select id="res">
        <option value="1280x720" selected>720p (1280×720)</option>
        <option value="1920x1080">1080p (1920×1080)</option>
        <option value="1080x1080">Square (1080×1080)</option>
        <option value="1080x1920">Vertical 9:16 (1080×1920)</option>
      </select>
    </div>

    <label class="toggle"><input type="checkbox" id="glow" checked /> Glow / bloom (prettier, heavier)</label>
    <label class="toggle"><input type="checkbox" id="shuffle" /> Shuffle styles every ~10s</label>

    <button class="primary" id="record" disabled>● Record video</button>
    <p class="hint">Recording runs in real time and plays the song aloud. The video downloads as <b>.webm</b> when it finishes. Use 720p if recording stutters.</p>
  </section>

  <section class="stage">
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div class="badge" id="badge"><span class="dot"></span><span id="badgeText">REC</span></div>
    </div>
    <div class="resbar"><i id="progress"></i></div>
    <div class="transport">
      <button class="ghost" id="preview" disabled>▶ Preview</button>
      <button class="ghost" id="stop" disabled>■ Stop</button>
      <span class="time" id="time">0:00 / 0:00</span>
      <span id="output" class="hint"></span>
    </div>
  </section>
</main>

<script>
(() => {
  "use strict";

  // ---- Themes ---------------------------------------------------------------
  const THEMES = [
    { name: "Aurora",  bg: "#07070d", grad: ["#6c7bff", "#ff5b9e"] },
    { name: "Sunset",  bg: "#0d0606", grad: ["#ff8a3d", "#ff2d6f"] },
    { name: "Mint",    bg: "#04100c", grad: ["#41d6a0", "#3da8ff"] },
    { name: "Vapor",   bg: "#0a0418", grad: ["#ff71ce", "#05d9e8"] },
    { name: "Mono",    bg: "#0a0a0a", grad: ["#ffffff", "#9aa0b5"] },
    { name: "Lava",    bg: "#100404", grad: ["#ffd166", "#ef476f"] },
    { name: "Ice",     bg: "#040a12", grad: ["#9be7ff", "#6c7bff"] },
    { name: "Gold",    bg: "#0c0a04", grad: ["#fff1a8", "#ff9e2c"] },
  ];
  let theme = THEMES[0];

  // ---- DOM ------------------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const canvas = $("canvas"), ctx = canvas.getContext("2d");
  const fileInput = $("file"), drop = $("drop"), fileName = $("fileName");
  const styleSel = $("style"), resSel = $("res"), glowChk = $("glow"), shuffleChk = $("shuffle");
  const STYLES = ["bars", "mirror", "spectrum", "circle", "blob", "wave", "galaxy", "rings"];
  const recordBtn = $("record"), previewBtn = $("preview"), stopBtn = $("stop");
  const badge = $("badge"), badgeText = $("badgeText");
  const timeEl = $("time"), progressEl = $("progress"), outputEl = $("output");

  // ---- Audio state ----------------------------------------------------------
  let audioCtx = null, analyser = null, audioBuffer = null;
  let sourceNode = null, gainNode = null, streamDest = null;
  let freqData = null, timeData = null;
  let baseName = "visualizer";

  let rafId = null, startTime = 0, playing = false, recording = false;
  let recorder = null, chunks = [];
  let firstFrame = true, rot = 0, ringPhase = 0, particles = [], shuffleNextAt = 0;

  // Switch to a random (different) style and schedule the next switch ~10s out.
  function scheduleShuffle(elapsed) { shuffleNextAt = elapsed + 8 + Math.random() * 5; }
  function shuffleStyle() {
    let next;
    do { next = STYLES[Math.floor(Math.random() * STYLES.length)]; } while (next === styleSel.value);
    styleSel.value = next;
    firstFrame = true; particles = []; // clean slate for trail/particle styles
  }

  // ---- Color helpers --------------------------------------------------------
  function hexToRgb(h) {
    h = h.replace("#", "");
    if (h.length === 3) h = h.split("").map(c => c + c).join("");
    const n = parseInt(h, 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }
  function mix(c1, c2, t) {
    const a = hexToRgb(c1), b = hexToRgb(c2);
    return `rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`;
  }
  function rgba(hex, a) { const [r,g,b] = hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; }
  function setGlow(color, blur) {
    if (glowChk.checked) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
  }
  function clearGlow() { ctx.shadowBlur = 0; }

  // ---- Sizing ---------------------------------------------------------------
  function setCanvasSize() {
    const [w, h] = resSel.value.split("x").map(Number);
    canvas.width = w; canvas.height = h;
  }
  resSel.addEventListener("change", () => { setCanvasSize(); drawIdle(); });
  setCanvasSize();

  // ---- Swatches -------------------------------------------------------------
  const swatchWrap = $("swatches");
  THEMES.forEach((t, i) => {
    const s = document.createElement("div");
    s.className = "swatch" + (i === 0 ? " active" : "");
    s.style.background = `linear-gradient(135deg, ${t.grad[0]}, ${t.grad[1]})`;
    s.title = t.name;
    s.addEventListener("click", () => {
      theme = t;
      [...swatchWrap.children].forEach(c => c.classList.remove("active"));
      s.classList.add("active");
      if (!playing) drawIdle();
    });
    swatchWrap.appendChild(s);
  });
  styleSel.addEventListener("change", () => { if (!playing) drawIdle(); });

  // ---- File loading ---------------------------------------------------------
  drop.addEventListener("click", () => fileInput.click());
  drop.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") fileInput.click(); });
  drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("over"); });
  drop.addEventListener("dragleave", () => drop.classList.remove("over"));
  drop.addEventListener("drop", (e) => {
    e.preventDefault(); drop.classList.remove("over");
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  async function loadFile(file) {
    fileName.textContent = "Decoding " + file.name + "…";
    baseName = file.name.replace(/\.[^.]+$/, "") || "visualizer";
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const arr = await file.arrayBuffer();
      audioBuffer = await audioCtx.decodeAudioData(arr);
      fileName.textContent = file.name + "  ·  " + fmt(audioBuffer.duration);
      recordBtn.disabled = false; previewBtn.disabled = false;
      outputEl.textContent = "";
      updateTime(0);
      drawIdle();
    } catch (err) {
      fileName.textContent = "Could not decode that file. Try a standard MP3/WAV.";
      console.error(err);
    }
  }

  // ---- Playback graph -------------------------------------------------------
  function buildGraph(forRecording) {
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.82;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);

    gainNode = audioCtx.createGain();
    sourceNode = audioCtx.createBufferSource();
    sourceNode.buffer = audioBuffer;

    sourceNode.connect(analyser);
    analyser.connect(gainNode);
    gainNode.connect(audioCtx.destination); // audible

    if (forRecording) {
      streamDest = audioCtx.createMediaStreamDestination();
      gainNode.connect(streamDest); // captured
    }
  }

  function start(forRecording) {
    if (!audioBuffer) return;
    if (audioCtx.state === "suspended") audioCtx.resume();
    buildGraph(forRecording);
    firstFrame = true; particles = []; rot = 0; ringPhase = 0;
    if (shuffleChk.checked) scheduleShuffle(0);
    sourceNode.onended = () => { if (playing) finish(); };
    startTime = audioCtx.currentTime;
    sourceNode.start(0);
    playing = true;
    previewBtn.disabled = true; recordBtn.disabled = true; stopBtn.disabled = false;
    loop();
  }

  function finish() {
    playing = false;
    cancelAnimationFrame(rafId);
    try { sourceNode && sourceNode.stop(); } catch (_) {}
    if (recording && recorder && recorder.state !== "inactive") recorder.stop();
    recording = false;
    badge.classList.remove("show");
    stopBtn.disabled = true; previewBtn.disabled = false; recordBtn.disabled = false;
    progressEl.style.width = "0%";
    drawIdle();
  }

  previewBtn.addEventListener("click", () => start(false));
  stopBtn.addEventListener("click", finish);

  // ---- Recording ------------------------------------------------------------
  recordBtn.addEventListener("click", () => {
    if (!audioBuffer) return;
    outputEl.textContent = "";
    start(true);

    const fps = 60;
    const videoStream = canvas.captureStream(fps);
    const mixed = new MediaStream([
      ...videoStream.getVideoTracks(),
      ...streamDest.stream.getAudioTracks(),
    ]);

    const mime = pickMime();
    recorder = new MediaRecorder(mixed, mime ? { mimeType: mime, videoBitsPerSecond: 8_000_000 } : undefined);
    chunks = [];
    recorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: chunks[0] ? chunks[0].type : "video/webm" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = baseName + ".webm"; a.textContent = "⤓ Download " + baseName + ".webm";
      a.className = "dl";
      outputEl.textContent = ""; outputEl.appendChild(a);
      const tmp = document.createElement("a");
      tmp.href = url; tmp.download = baseName + ".webm"; tmp.click();
    };
    recording = true;
    recorder.start();
    badgeText.textContent = "REC";
    badge.classList.add("show");
  });

  function pickMime() {
    const c = ["video/webm;codecs=vp9,opus", "video/webm;codecs=vp8,opus", "video/webm"];
    return c.find(m => MediaRecorder.isTypeSupported(m)) || "";
  }

  // ---- Render loop ----------------------------------------------------------
  function loop() {
    rafId = requestAnimationFrame(loop);
    const elapsed = audioCtx.currentTime - startTime;
    updateTime(elapsed);
    if (audioBuffer) progressEl.style.width = Math.min(100, (elapsed / audioBuffer.duration) * 100) + "%";

    if (shuffleChk.checked && elapsed >= shuffleNextAt) { shuffleStyle(); scheduleShuffle(elapsed); }

    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);
    render(styleSel.value);
    firstFrame = false;
  }

  function bandEnergy(lo, hi) {
    let s = 0; for (let i = lo; i < hi; i++) s += freqData[i];
    return s / ((hi - lo) * 255);
  }

  function paintBackground() {
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const g = ctx.createRadialGradient(canvas.width/2, canvas.height*0.42, 0, canvas.width/2, canvas.height/2, canvas.width*0.78);
    g.addColorStop(0, "rgba(255,255,255,0.045)");
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  function fade(alpha) {
    const [r,g,b] = hexToRgb(theme.bg);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Styles that paint over a fading frame (motion trails) instead of a fresh bg
  const TRAIL = { wave: 0.14, galaxy: 0.16, rings: 0.18, blob: 0.20 };

  function render(style) {
    const W = canvas.width, H = canvas.height;
    if (style in TRAIL && !firstFrame) fade(TRAIL[style]);
    else paintBackground();

    switch (style) {
      case "bars":      return renderBars(W, H, false);
      case "mirror":    return renderBars(W, H, true);
      case "spectrum":  return renderSpectrum(W, H);
      case "circle":    return renderCircle(W, H);
      case "blob":      return renderBlob(W, H);
      case "wave":      return renderWave(W, H);
      case "galaxy":    return renderGalaxy(W, H);
      case "rings":     return renderRings(W, H);
    }
  }

  // ---- Visualizers ----------------------------------------------------------
  function renderBars(W, H, mirror) {
    const count = 80;
    const step = Math.floor((freqData.length * 0.7) / count);
    const bw = W / count;
    const baseline = mirror ? H / 2 : H * 0.84;
    for (let i = 0; i < count; i++) {
      let v = 0; for (let j = 0; j < step; j++) v += freqData[i*step + j];
      v = (v / step) / 255;
      const bh = Math.pow(v, 1.5) * H * (mirror ? 0.46 : 0.78);
      const x = i * bw + bw * 0.14, w = bw * 0.72, r = Math.min(w/2, 10);
      const col = mix(theme.grad[0], theme.grad[1], i / count);
      ctx.fillStyle = col; setGlow(col, 16);
      if (mirror) {
        roundRect(x, H/2 - bh, w, bh, r);
        roundRect(x, H/2, w, bh, r);
      } else {
        roundRect(x, baseline - bh, w, bh, r);
        // fading reflection below the baseline
        clearGlow();
        const refl = ctx.createLinearGradient(0, baseline, 0, baseline + bh * 0.7);
        refl.addColorStop(0, col); refl.addColorStop(1, "rgba(0,0,0,0)");
        ctx.globalAlpha = 0.18; ctx.fillStyle = refl;
        ctx.fillRect(x, baseline, w, bh * 0.7);
        ctx.globalAlpha = 1;
      }
    }
    clearGlow();
  }

  function renderSpectrum(W, H) {
    const n = 110, step = Math.floor((freqData.length * 0.7) / n);
    const baseline = H * 0.82;
    const pts = [];
    for (let i = 0; i <= n; i++) {
      let v = 0; for (let j = 0; j < step; j++) v += freqData[Math.min(freqData.length-1, i*step + j)];
      v = (v / step) / 255;
      pts.push([i / n * W, baseline - Math.pow(v, 1.4) * H * 0.6]);
    }
    const trace = () => {
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 0; i < pts.length - 1; i++) {
        const mx = (pts[i][0] + pts[i+1][0]) / 2, my = (pts[i][1] + pts[i+1][1]) / 2;
        ctx.quadraticCurveTo(pts[i][0], pts[i][1], mx, my);
      }
    };
    // fill
    ctx.beginPath(); ctx.moveTo(0, baseline); ctx.lineTo(pts[0][0], pts[0][1]); trace();
    ctx.lineTo(W, baseline); ctx.closePath();
    const g = ctx.createLinearGradient(0, baseline - H*0.6, 0, baseline);
    g.addColorStop(0, theme.grad[1]); g.addColorStop(1, rgba(theme.grad[0], 0.12));
    ctx.fillStyle = g; ctx.fill();
    // glowing crest
    ctx.beginPath(); trace();
    ctx.strokeStyle = theme.grad[0]; ctx.lineWidth = Math.max(2, H/360);
    setGlow(theme.grad[0], 22); ctx.stroke(); clearGlow();
    // reflection
    ctx.save(); ctx.globalAlpha = 0.12; ctx.translate(0, baseline * 2); ctx.scale(1, -1);
    ctx.beginPath(); ctx.moveTo(0, baseline); ctx.lineTo(pts[0][0], pts[0][1]); trace();
    ctx.lineTo(W, baseline); ctx.closePath(); ctx.fillStyle = theme.grad[1]; ctx.fill();
    ctx.restore(); ctx.globalAlpha = 1;
  }

  function renderCircle(W, H) {
    const cx = W/2, cy = H/2; rot += 0.0022;
    const R = Math.min(W, H) * 0.17;
    const half = 100, step = Math.floor((freqData.length * 0.55) / half);
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(rot); ctx.lineCap = "round";
    for (let s = 0; s < 2; s++) {
      for (let i = 0; i < half; i++) {
        let v = 0; for (let j = 0; j < step; j++) v += freqData[i*step + j];
        v = (v / step) / 255;
        const len = Math.pow(v, 1.3) * R * 1.9;
        const ang = (i / half) * Math.PI * (s ? -1 : 1) - Math.PI/2;
        const col = mix(theme.grad[0], theme.grad[1], i / half);
        ctx.strokeStyle = col; setGlow(col, 12);
        ctx.lineWidth = Math.max(2, Math.min(W,H) / 300);
        ctx.beginPath();
        ctx.moveTo(Math.cos(ang)*R, Math.sin(ang)*R);
        ctx.lineTo(Math.cos(ang)*(R+len), Math.sin(ang)*(R+len));
        ctx.stroke();
      }
    }
    const bass = bandEnergy(0, 8);
    const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, R);
    cg.addColorStop(0, theme.grad[0]); cg.addColorStop(1, theme.grad[1]);
    setGlow(theme.grad[1], 40); ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(0, 0, R * (0.6 + bass * 0.45), 0, Math.PI*2); ctx.fill();
    clearGlow(); ctx.restore();
  }

  function renderBlob(W, H) {
    const cx = W/2, cy = H/2; rot += 0.004;
    const bass = bandEnergy(0, 10);
    const baseR = Math.min(W, H) * 0.16 * (1 + bass * 0.6);
    const N = 72, pts = [];
    for (let i = 0; i < N; i++) {
      const bin = Math.floor(i / N * 120);
      const v = freqData[bin] / 255;
      const ang = i / N * Math.PI * 2 + rot;
      const r = baseR + Math.pow(v, 1.2) * Math.min(W, H) * 0.17;
      pts.push([cx + Math.cos(ang)*r, cy + Math.sin(ang)*r]);
    }
    ctx.beginPath();
    const f = [(pts[N-1][0]+pts[0][0])/2, (pts[N-1][1]+pts[0][1])/2];
    ctx.moveTo(f[0], f[1]);
    for (let i = 0; i < N; i++) {
      const cur = pts[i], next = pts[(i+1)%N];
      ctx.quadraticCurveTo(cur[0], cur[1], (cur[0]+next[0])/2, (cur[1]+next[1])/2);
    }
    ctx.closePath();
    const g = ctx.createRadialGradient(cx, cy, baseR*0.2, cx, cy, baseR*2.4);
    g.addColorStop(0, theme.grad[0]); g.addColorStop(1, theme.grad[1]);
    setGlow(theme.grad[1], 45); ctx.fillStyle = g; ctx.fill();
    clearGlow();
    // inner highlight
    ctx.globalAlpha = 0.25; ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(cx - baseR*0.25, cy - baseR*0.25, baseR*0.35, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  function renderWave(W, H) {
    const layers = 3;
    const slice = W / timeData.length;
    for (let L = 0; L < layers; L++) {
      const amp = H * (0.16 + L * 0.07);
      const off = H/2 + (L - 1) * H * 0.05;
      const col = mix(theme.grad[0], theme.grad[1], layers === 1 ? 0 : L / (layers - 1));
      ctx.beginPath();
      for (let i = 0; i < timeData.length; i++) {
        const v = timeData[i] / 128 - 1;
        const y = off + v * amp;
        const x = i * slice;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = rgba(L === 0 ? theme.grad[0] : theme.grad[1], 0.75 - L * 0.18);
      ctx.lineWidth = Math.max(1.5, H / 320) * (layers - L);
      setGlow(col, 26); ctx.stroke();
    }
    clearGlow();
  }

  function renderGalaxy(W, H) {
    const cx = W/2, cy = H/2;
    const bass = bandEnergy(0, 6), mid = bandEnergy(20, 70);
    const spawn = 2 + Math.floor(bass * 16);
    for (let i = 0; i < spawn && particles.length < 650; i++) {
      const ang = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3 + bass * 6;
      particles.push({ x: cx, y: cy, vx: Math.cos(ang)*speed, vy: Math.sin(ang)*speed, life: 1, t: Math.random() });
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.985; p.vy *= 0.985; p.life -= 0.011;
      if (p.life <= 0 || p.x < -20 || p.x > W+20 || p.y < -20 || p.y > H+20) { particles.splice(i, 1); continue; }
      const col = mix(theme.grad[0], theme.grad[1], p.t);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = col; setGlow(col, 10);
      const size = 1.4 + p.t * 3 + mid * 2;
      ctx.beginPath(); ctx.arc(p.x, p.y, size, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1; clearGlow();
    // bright core
    const col = mix(theme.grad[0], theme.grad[1], 0.5);
    setGlow(col, 50); ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(cx, cy, 8 + bass * 40, 0, Math.PI*2); ctx.fill();
    clearGlow();
  }

  function renderRings(W, H) {
    const cx = W/2, cy = H/2;
    const e = bandEnergy(0, 24); ringPhase += 0.008 + e * 0.05;
    for (let r = 0; r < 7; r++) {
      const t = (ringPhase + r / 7) % 1;
      const rad = t * Math.min(W, H) * 0.6;
      const col = mix(theme.grad[0], theme.grad[1], t);
      ctx.globalAlpha = (1 - t) * 0.85;
      ctx.lineWidth = 2 + e * 18 * (1 - t);
      ctx.strokeStyle = col; setGlow(col, 20);
      ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    const col = mix(theme.grad[0], theme.grad[1], 0.5);
    setGlow(col, 45); ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(cx, cy, 14 + e * 75, 0, Math.PI*2); ctx.fill();
    clearGlow();
  }

  function roundRect(x, y, w, h, r) {
    if (h <= 0) return;
    r = Math.min(r, h/2, w/2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.fill();
  }

  function drawIdle() {
    clearGlow();
    paintBackground();
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.textAlign = "center";
    ctx.font = `${Math.round(H/22)}px -apple-system, "Segoe UI", sans-serif`;
    ctx.fillText(audioBuffer ? "Ready — press Preview or Record" : "Load an MP3 to begin", W/2, H/2);
  }

  // ---- Helpers --------------------------------------------------------------
  function fmt(s) {
    s = Math.max(0, Math.floor(s));
    return Math.floor(s/60) + ":" + String(s%60).padStart(2, "0");
  }
  function updateTime(el) {
    const dur = audioBuffer ? audioBuffer.duration : 0;
    timeEl.textContent = fmt(el) + " / " + fmt(dur);
  }

  glowChk.addEventListener("change", () => { if (!playing) drawIdle(); });
  shuffleChk.addEventListener("change", () => {
    styleSel.disabled = shuffleChk.checked; // dropdown is driven automatically while shuffling
    if (shuffleChk.checked && playing) scheduleShuffle(audioCtx.currentTime - startTime);
  });
  drawIdle();
  if (!window.MediaRecorder) {
    outputEl.textContent = "This browser lacks MediaRecorder — recording is unavailable.";
    recordBtn.disabled = true;
  }
})();
</script>
</body>
